function readyLabel(p){if(p==null)return{t:"Not assessed",c:""};if(p>=PASS)return{t:"Exam-ready",c:"green"};if(p>=PASS-12)return{t:"Close — keep pushing",c:"amber"};return{t:"Needs work",c:"red"};}
let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

   ============================================================ */
const VIEWS={};
let STATE={view:"dashboard",params:{}};
function go(view,params={}){STATE={view,params};render();window.scrollTo(0,0);}
function render(){
  $$("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.view===STATE.view));
  const main=$("#main");main.innerHTML="";
  (VIEWS[STATE.view]||VIEWS.dashboard)(main,STATE.params);
}
$("#nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b)go(b.dataset.view);});

  const examsAll=cs.flatMap(c=>c.exams.map(e=>({...e,client:c.name})));

  const upcoming=cs.filter(c=>{const d=daysUntil(c.examDate);return d!=null&&d>=0&&d<=30;}).length;
  const avg=examsAll.length?Math.round(examsAll.reduce((a,e)=>a+e.pct,0)/examsAll.length):null;

  root.append(el(`<div class="page-head spread">
    <div><div class="kicker">Coach Dashboard</div><h1>The whole roster, at a glance</h1>
    <p class="muted">Every client, their readiness, and what's coming up. Click anyone to open their full file.</p></div>
    <div class="row">
      <button class="btn" id="exp">⭳ Export</button>
      <button class="btn" id="imp">⭱ Import</button>
      <button class="btn primary" id="add">＋ New client</button>
    </div>
  </div>`));

  const stats=el(`<div class="grid g4" style="margin-bottom:22px"></div>`);
  stats.append(
    el(`<div class="stat"><div class="n">${cs.length}</div><div class="l">Active clients</div></div>`),
    el(`<div class="stat"><div class="n" style="color:var(--green)">${ready}</div><div class="l">Exam-ready (≥${PASS}%)</div></div>`),
    el(`<div class="stat"><div class="n" style="color:var(--amber)">${upcoming}</div><div class="l">Exams in ≤30 days</div></div>`),
    el(`<div class="stat"><div class="n">${avg==null?"—":avg+"%"}</div><div class="l">Avg mock score</div></div>`)
  );
  root.append(stats);

  const dupes=duplicateGroups();
  if(dupes.length){
    const n=dupes.reduce((a,g)=>a+g.length,0);
    const banner=el(`<div class="card tight" style="border-color:var(--warn);background:rgba(255,122,69,.08);margin-bottom:18px">
      <div class="spread"><div><b style="color:var(--warn)">⚠ ${dupes.length} possible duplicate ${dupes.length>1?"clients":"client"} found</b>
      <div class="muted" style="font-size:13px;margin-top:3px">${n} records share a name and trade. Merge them into one file — all exams, sessions, intake and plan are kept.</div></div>
      <button class="btn sm" id="mergeBtn">Review &amp; merge</button></div></div>`);
    root.append(banner);
    $("#mergeBtn",root).onclick=()=>mergeModal();
  }

  if(!cs.length){
    root.append(el(`<div class="empty"><div class="big">◈</div><b>No clients yet.</b><br>Start with a <a href="#" id="e1">Readiness Intake</a> to create your first client file.</div>`));
    $("#e1",root).onclick=ev=>{ev.preventDefault();go("intake");};
  } else {
    const card=el(`<div class="card"><div class="spread" style="margin-bottom:6px"><h3>Roster</h3><span class="dim">${cs.length} client${cs.length>1?"s":""}</span></div></div>`);
    const tbl=el(`<table><thead><tr><th>Client</th><th>Trade</th><th>Readiness</th><th>Last mock</th><th>Exam date</th><th>Countdown</th></tr></thead><tbody></tbody></table>`);
    const tb=$("tbody",tbl);
    cs.slice().sort((a,b)=>(daysUntil(a.examDate)??1e9)-(daysUntil(b.examDate)??1e9)).forEach(c=>{
      const r=readiness(c);const rl=readyLabel(r==null?null:r);
      const last=c.exams[c.exams.length-1];
      const d=daysUntil(c.examDate);
      const cd=d==null?'<span class="dim">—</span>':d<0?'<span class="pill">done</span>':`<span class="pill ${d<=14?'red':d<=30?'amber':''}">${d} d</span>`;
      const tr=el(`<tr class="click">
        <td><b>${esc(c.name)}</b></td>
        <td>${TRADES[c.trade].emoji} ${esc(TRADES[c.trade].name)}</td>
        <td>${r==null?'<span class="dim">—</span>':`<span class="pill ${rl.c}">${r}% · ${rl.t}</span>`}</td>
        <td>${last?`<span class="pill ${pctClass(last.pct)}">${last.pct}%</span>`:'<span class="dim">none</span>'}</td>
        <td>${fmtDate(c.examDate)}</td>
        <td>${cd}</td>
      </tr>`);
      tr.onclick=()=>go("client",{id:c.id});
      tb.append(tr);
    });
    card.append(tbl);root.append(card);
  }

  $("#add",root).onclick=()=>addClientModal();
  $("#exp",root).onclick=()=>exportData();
  $("#imp",root).onclick=()=>importData();
};

function readiness(c){
  // Prefer most recent mock exam; fall back to intake diagnostic; else null.
  if(c.exams&&c.exams.length)return c.exams[c.exams.length-1].pct;
  if(c.intake&&c.intake.readiness!=null)return c.intake.readiness;
  return null;
}

    right.append(ps);
    setTimeout(()=>{$("#openPlan",root)&&($("#openPlan",root).onclick=()=>go("plan",{id:c.id}));},0);
  }

  cols.append(left,right);root.append(cols);
};

VIEWS.intake=function(root,{id}){
  let client=id?getClient(id):null;
  const st={step:0, clientId:id||null, trade:client?client.trade:"electrician",
            name:client?client.name:"", examDate:client?client.examDate:"",
            confidence:{}, answers:{}, qset:[]};

  function head(t,p){return `<div class="page-head"><div class="kicker">Readiness Intake</div><h1>${t}</h1><p class="muted">${p}</p></div>`;}
  function blocksOf(){return TRADES[st.trade].blocks;}

  function start(){
    root.innerHTML="";
    root.append(el(head("Where are they starting from?","A 10-minute diagnostic that scores a new client's baseline, finds their weak blocks, and recommends a plan. It creates (or updates) their client file.")));
    const card=el(`<div class="card" style="max-width:620px"></div>`);
    card.append(el(`<div class="grid g2">
      <label class="fld">Client name<input type="text" id="iName" value="${esc(st.name)}" placeholder="e.g. Dave Kowalski"></label>
      <label class="fld">Target exam date<input type="date" id="iDate" value="${st.examDate}"></label>
    </div>`));
    const tl=el(`<label class="fld" style="margin-top:14px">Trade</label>`);
    const seg=el(`<div class="seg" style="flex-wrap:wrap"></div>`);
    trades().forEach(k=>{const b=el(`<button class="${k===st.trade?'on':''}">${TRADES[k].emoji} ${TRADES[k].name.split(" ")[0]}</button>`);b.onclick=()=>{st.trade=k;[...seg.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");};seg.append(b);});
    card.append(tl,seg);
    card.append(el(`<div class="divider"></div>`));
    const nb=el(`<button class="btn primary" id="next">Begin self-rating →</button>`);
    nb.onclick=()=>{
      st.name=$("#iName",card).value.trim();st.examDate=$("#iDate",card).value;
      if(!st.name){toast("Enter a client name");return;}
      confidence();
    };
    card.append(nb);
    root.append(card);
  }

  function confidence(){
    root.innerHTML="";
    root.append(el(head("Self-rating: how confident on each block?",`Have ${esc(st.name)} rate themselves 1 (shaky) to 5 (solid). This becomes the baseline we compare progress against.`)));
    const card=el(`<div class="card" style="max-width:640px"></div>`);
    blocksOf().forEach(b=>{
      const cur=st.confidence[b]||0;
      const wrap=el(`<div style="margin-bottom:16px"><div style="font-weight:600;margin-bottom:7px">${esc(b)}</div></div>`);
      const sc=el(`<div class="scale"></div>`);
      for(let i=1;i<=5;i++){const bt=el(`<button class="${cur===i?'on':''}">${i}</button>`);bt.onclick=()=>{st.confidence[b]=i;[...sc.children].forEach(x=>x.classList.remove("on"));bt.classList.add("on");};sc.append(bt);}
      wrap.append(sc);card.append(wrap);
    });
    card.append(el(`<div class="divider"></div>`));
    const r=el(`<div class="row"><button class="btn ghost" id="bk">← Back</button><button class="btn primary grow" id="next">Start diagnostic quiz →</button></div>`);
    card.append(r);root.append(card);
    $("#bk",card).onclick=start;
    $("#next",card).onclick=()=>{
      if(blocksOf().some(b=>!st.confidence[b])){toast("Rate every block first");return;}
      st.qset=shuffle(questionsFor(st.trade));diagnostic();
    };
  }

  function diagnostic(){
    let i=0;
    function paint(){
      root.innerHTML="";
      const q=st.qset[i];
      root.append(el(`<div class="page-head spread"><div><div class="kicker">Diagnostic · ${esc(st.name)}</div><h1>Question ${i+1} <span class="dim" style="font-weight:400">/ ${st.qset.length}</span></h1></div><span class="pill amber">${esc(q.block)}</span></div>`));
      const card=el(`<div class="card" style="max-width:680px"></div>`);
      card.append(el(`<div style="font-size:17px;font-weight:600;margin-bottom:16px">${esc(q.q)}</div>`));
      q.opts.forEach((o,oi)=>{
        const sel=st.answers[i]===oi;
        const opt=el(`<div class="q-opt ${sel?'sel':''}"><div class="key">${"ABCD"[oi]}</div><div>${esc(o)}</div></div>`);
        opt.onclick=()=>{st.answers[i]=oi;paint();};
        card.append(opt);
      });
      card.append(el(`<div class="divider"></div>`));
      const nav=el(`<div class="row"><button class="btn ghost" id="prev" ${i===0?"disabled":""}>← Prev</button><div class="grow"></div><button class="btn primary" id="next">${i===st.qset.length-1?"Finish & score":"Next →"}</button></div>`);
      card.append(nav);root.append(card);
      $("#prev",card).onclick=()=>{if(i>0){i--;paint();}};
      $("#next",card).onclick=()=>{
        if(st.answers[i]==null){toast("Pick an answer");return;}
        if(i<st.qset.length-1){i++;paint();}else finish();
      };
    }
    paint();
  }

  function finish(){
    const blocks=blocksOf();
    const byBlock={};blocks.forEach(b=>byBlock[b]={correct:0,total:0});
    let correct=0;
    st.qset.forEach((q,idx)=>{byBlock[q.block].total++;if(st.answers[idx]===q.answer){correct++;byBlock[q.block].correct++;}});
    const total=st.qset.length;const pct=Math.round(correct/total*100);
    // weighted readiness: 70% diagnostic, 30% self-confidence (scaled to 100)
    const confAvg=blocks.reduce((a,b)=>a+(st.confidence[b]||0),0)/blocks.length;
    const confPct=Math.round((confAvg/5)*100);
    const readinessScore=Math.round(pct*0.7+confPct*0.3);

    const weak=blocks.map(b=>({b,p:byBlock[b].total?Math.round(byBlock[b].correct/byBlock[b].total*100):0}))
                     .sort((a,b)=>a.p-b.p).slice(0,3).map(x=>x.b);

    // persist into client — reuse an existing match (don't duplicate), and lock
    // st.clientId so a re-trigger of finish() can't create a second record.
    if(!st.clientId){const match=findClientByNameTrade(st.name,st.trade);if(match)st.clientId=match.id;}
    if(st.clientId){client=getClient(st.clientId);client.trade=st.trade;client.examDate=st.examDate;}
    else client=newClient(st.name,st.trade,st.examDate);
    st.clientId=client.id;
    const reused=!!client.intake;
    client.intake={confidence:{...st.confidence},diagnostic:{score:correct,total,byBlock},readiness:readinessScore,weak,date:today()};
    save();

    root.innerHTML="";
    const rl=readyLabel(readinessScore);
    root.append(el(`<div class="page-head"><div class="kicker">Baseline complete</div><h1>${esc(st.name)} — ${readinessScore}% ready</h1><p class="muted">Diagnostic ${pct}% · self-confidence ${confPct}%. Blended into a baseline readiness score we'll track from here.</p></div>`));
    const top=el(`<div class="grid g3" style="margin-bottom:18px"></div>`);
    top.append(
      el(`<div class="stat"><div class="n" style="color:${readinessScore>=PASS?'var(--green)':readinessScore>=PASS-12?'var(--amber)':'#ff5e78'}">${readinessScore}%</div><div class="l">Baseline readiness</div></div>`),
      el(`<div class="stat"><div class="n">${correct}/${total}</div><div class="l">Diagnostic score</div></div>`),
      el(`<div class="stat"><div class="n"><span class="pill ${rl.c}" style="font-size:14px">${rl.t}</span></div><div class="l">Verdict</div></div>`)
    );
    root.append(top);

    const card=el(`<div class="card" style="max-width:720px"><h3>Where to focus first</h3><div class="sub">Lowest-scoring competencies — the study plan will front-load these.</div></div>`);
    blocks.map(b=>({b,o:byBlock[b]})).sort((a,b)=>(a.o.correct/Math.max(1,a.o.total))-(b.o.correct/Math.max(1,b.o.total))).forEach(({b,o})=>{
      const p=o.total?Math.round(o.correct/o.total*100):0;
      card.append(el(`<div style="margin:11px 0"><div class="spread" style="margin-bottom:5px"><span style="font-weight:600;font-size:13.5px">${esc(b)} ${weak.includes(b)?'<span class="chip" style="background:rgba(255,122,69,.18);color:var(--warn)">focus</span>':''}</span><span class="tag">${o.correct}/${o.total} · ${p}%</span></div><div class="bar"><i style="width:${p}%;background:${p>=PASS?'var(--green)':p>=PASS-12?'var(--amber)':'var(--red)'}"></i></div></div>`));
    });
    card.append(el(`<div class="divider"></div>`));
    const r=el(`<div class="row"><button class="btn primary" id="plan">Build study plan from this →</button><button class="btn" id="file">Open client file</button></div>`);
    card.append(r);root.append(card);
    $("#plan",card).onclick=()=>go("plan",{id:client.id});
    $("#file",card).onclick=()=>go("client",{id:client.id});
    toast(reused?("Updated existing file · "+st.name):("Baseline saved to "+st.name));
  }

  start();
};

   9. MOCK EXAM ENGINE
   ============================================================ */
VIEWS.exam=function(root,{id}){
  let client=id?getClient(id):null;
  const st={clientId:id||null, trade:client?client.trade:"electrician",
            length:"all", minutes:0, qset:[], answers:{}, timer:null, elapsed:0, started:false};

  function setup(){
    root.innerHTML="";
    root.append(el(`<div class="page-head"><div class="kicker">Mock Exam</div><h1>Timed Red Seal mock exam</h1><p class="muted">Multiple-choice, weighted across competency blocks, ${PASS}% to pass — the real format. Scores attach to the client file with a full per-block breakdown.</p></div>`));
    const card=el(`<div class="card" style="max-width:600px"></div>`);
    // trade (locked if launched from a client)
    if(client){
      card.append(el(`<div class="pill amber" style="margin-bottom:14px">${TRADES[st.trade].emoji} ${esc(client.name)} · ${TRADES[st.trade].name}</div>`));
    } else {
      const tl=el(`<label class="fld">Trade</label>`);
      const seg=el(`<div class="seg" style="flex-wrap:wrap;margin-bottom:8px"></div>`);
      trades().forEach(k=>{const b=el(`<button class="${k===st.trade?'on':''}">${TRADES[k].emoji} ${TRADES[k].name.split(" ")[0]}</button>`);b.onclick=()=>{st.trade=k;[...seg.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");avail();};seg.append(b);});
      card.append(tl,seg);
    }
    const availEl=el(`<div class="muted" style="font-size:13px;margin-bottom:14px"></div>`);
    card.append(availEl);
    function avail(){availEl.textContent=`${questionsFor(st.trade).length} questions in the bank for this trade.`;}
    avail();

    const ll=el(`<label class="fld">Exam length</label>`);
    const lseg=el(`<div class="seg" style="margin-bottom:6px"></div>`);
    [["10","Quick (10)"],["20","Standard (20)"],["all","Full bank"]].forEach(([v,lbl])=>{
      const b=el(`<button class="${st.length===v?'on':''}">${lbl}</button>`);
      b.onclick=()=>{st.length=v;[...lseg.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");};
      lseg.append(b);
    });
    card.append(ll,lseg);
    card.append(el(`<div class="divider"></div>`));
    const go2=el(`<button class="btn primary" id="go">▶ Start exam</button>`);
    go2.onclick=()=>{
      let pool=shuffle(questionsFor(st.trade));
      const n=st.length==="all"?pool.length:Math.min(+st.length,pool.length);
      st.qset=pool.slice(0,n);
      if(!st.qset.length){toast("No questions for this trade yet");return;}
      run();
    };
    card.append(go2);root.append(card);
  }

  function run(){
    st.started=true;st.elapsed=0;
    if(st.timer)clearInterval(st.timer);
    st.timer=setInterval(()=>{st.elapsed++;const t=$("#timer");if(t){const m=Math.floor(st.elapsed/60),s=st.elapsed%60;t.textContent=`${m}:${String(s).padStart(2,"0")}`;}},1000);
    let i=0;
    function paint(){
      root.innerHTML="";
      const q=st.qset[i];
      const answered=Object.keys(st.answers).length;
      root.append(el(`<div class="page-head spread">
        <div><div class="kicker">Mock Exam${client?" · "+esc(client.name):""}</div><h1>Question ${i+1} <span class="dim" style="font-weight:400">/ ${st.qset.length}</span></h1></div>
        <div class="row" style="align-items:center"><span class="timer" id="timer">0:00</span><button class="btn sm red ghost" id="abort">End</button></div>
      </div>`));
      // progress dots
      const prog=el(`<div class="bar" style="margin-bottom:16px"><i style="width:${answered/st.qset.length*100}%;background:var(--amber)"></i></div>`);
      root.append(prog);
      const card=el(`<div class="card" style="max-width:700px"><span class="pill" style="margin-bottom:12px">${esc(q.block)}</span></div>`);
      card.append(el(`<div style="font-size:17px;font-weight:600;margin:4px 0 16px">${esc(q.q)}</div>`));
      q.opts.forEach((o,oi)=>{
        const sel=st.answers[i]===oi;
        const opt=el(`<div class="q-opt ${sel?'sel':''}"><div class="key">${"ABCD"[oi]}</div><div>${esc(o)}</div></div>`);
        opt.onclick=()=>{st.answers[i]=oi;paint();};
        card.append(opt);
      });
      card.append(el(`<div class="divider"></div>`));
      const nav=el(`<div class="row"><button class="btn ghost" id="prev" ${i===0?"disabled":""}>← Prev</button><div class="grow"></div>
        <button class="btn" id="skip">Skip</button>
        <button class="btn primary" id="next">${i===st.qset.length-1?"Submit exam":"Next →"}</button></div>`);
      card.append(nav);root.append(card);
      const tm=$("#timer");const m=Math.floor(st.elapsed/60),s=st.elapsed%60;tm.textContent=`${m}:${String(s).padStart(2,"0")}`;
      $("#abort",root).onclick=()=>{if(confirm("End and score now? Unanswered questions count as wrong.")){submit();}};
      $("#prev",card).onclick=()=>{if(i>0){i--;paint();}};
      $("#skip",card).onclick=()=>{if(i<st.qset.length-1){i++;paint();}};
      $("#next",card).onclick=()=>{if(i<st.qset.length-1){i++;paint();}else submit();};
    }
    paint();
  }

  function submit(){
    clearInterval(st.timer);
    const blocks=TRADES[st.trade].blocks;
    const byBlock={};blocks.forEach(b=>byBlock[b]={correct:0,total:0});
    let correct=0;
    st.qset.forEach((q,idx)=>{byBlock[q.block].total++;if(st.answers[idx]===q.answer){correct++;byBlock[q.block].correct++;}});
    const total=st.qset.length;const pct=Math.round(correct/total*100);
    const minutes=Math.max(1,Math.round(st.elapsed/60));
    const rec={date:today(),trade:st.trade,score:correct,total,pct,byBlock,minutes};
    if(client){client.exams.push(rec);save();}

    root.innerHTML="";
    const passed=pct>=PASS;
    root.append(el(`<div class="page-head"><div class="kicker">Exam complete</div><h1>${passed?"🟢 Pass":"🔴 Below standard"} — ${pct}%</h1><p class="muted">${correct} of ${total} correct in ${minutes} min. Pass mark is ${PASS}%.${client?" Saved to "+esc(client.name)+"'s file.":""}</p></div>`));
    const top=el(`<div class="grid g4" style="margin-bottom:18px"></div>`);
    top.append(
      el(`<div class="stat"><div class="n" style="color:${passed?'var(--green)':'#ff5e78'}">${pct}%</div><div class="l">Score</div></div>`),
      el(`<div class="stat"><div class="n">${correct}/${total}</div><div class="l">Correct</div></div>`),
      el(`<div class="stat"><div class="n">${minutes}</div><div class="l">Minutes</div></div>`),
      el(`<div class="stat"><div class="n">${blocks.filter(b=>byBlock[b].total&&byBlock[b].correct/byBlock[b].total>=PASS/100).length}/${blocks.filter(b=>byBlock[b].total).length}</div><div class="l">Blocks passed</div></div>`)
    );
    root.append(top);

    const bc=el(`<div class="card" style="max-width:720px;margin-bottom:18px"><h3>Per-block breakdown</h3><div class="sub">Where the points came from — and where they leaked.</div></div>`);
    blocks.filter(b=>byBlock[b].total).sort((a,b)=>(byBlock[a].correct/byBlock[a].total)-(byBlock[b].correct/byBlock[b].total)).forEach(b=>{
      const o=byBlock[b];const p=Math.round(o.correct/o.total*100);
      bc.append(el(`<div style="margin:11px 0"><div class="spread" style="margin-bottom:5px"><span style="font-weight:600;font-size:13.5px">${esc(b)}</span><span class="tag">${o.correct}/${o.total} · ${p}%</span></div><div class="bar"><i style="width:${p}%;background:${p>=PASS?'var(--green)':p>=PASS-12?'var(--amber)':'var(--red)'}"></i></div></div>`));
    });
    root.append(bc);

    // answer review
    const rev=el(`<div class="card" style="max-width:720px"><h3>Review every question</h3><div class="sub">Each with the correct answer and the why.</div></div>`);
    st.qset.forEach((q,idx)=>{
      const ua=st.answers[idx];const ok=ua===q.answer;
      const item=el(`<div style="padding:14px 0;border-bottom:1px solid var(--line)"><div class="spread" style="margin-bottom:9px"><span style="font-weight:600">${idx+1}. ${esc(q.q)}</span><span class="pill ${ok?'green':'red'}">${ok?'✓':'✗'}</span></div></div>`);
      q.opts.forEach((o,oi)=>{
        let cls="";if(oi===q.answer)cls="correct";else if(oi===ua)cls="wrong";
        item.append(el(`<div class="q-opt ${cls}" style="cursor:default;margin-bottom:7px"><div class="key">${"ABCD"[oi]}</div><div>${esc(o)}</div></div>`));
      });
      item.append(el(`<div class="muted" style="font-size:13px;margin-top:4px"><b style="color:var(--amber)">Why:</b> ${esc(q.why)}</div>`));
      rev.append(item);
    });
    root.append(rev);

    const r=el(`<div class="row" style="margin-top:18px"><button class="btn primary" id="again">Take another</button>${client?`<button class="btn" id="file">Back to ${esc(client.name)}</button>`:""}<button class="btn ghost" id="plan">Build study plan</button></div>`);
    root.append(r);
    $("#again",root).onclick=()=>VIEWS.exam(root,{id});
    if(client)$("#file",root).onclick=()=>go("client",{id:client.id});
    $("#plan",root).onclick=()=>go("plan",{id:client?client.id:null});
    if(client)toast("Result saved · "+pct+"%");
  }

  setup();
};

function buildPlan(trade,examDate,hours,weak){
  const blocks=TRADES[trade].blocks;
  const totalWeeks=Math.max(2,Math.min(16,Math.ceil(daysUntil(examDate)/7)));
  // order blocks: weak first, then the rest
  const ordered=[...weak.filter(b=>blocks.includes(b)),...blocks.filter(b=>!weak.includes(b))];
  const weeks=[];
  // reserve final ~25% of weeks for mock exams + review
  const reviewWeeks=Math.max(1,Math.round(totalWeeks*0.25));
  const contentWeeks=totalWeeks-reviewWeeks;
  for(let w=0;w<totalWeeks;w++){
    const tasks=[];
    if(w<contentWeeks){
      // assign 1-2 blocks per content week, cycling through ordered (weak get more passes)
      const idx=w%ordered.length;
      const focus=ordered[idx];
      const lib=(STUDY_TASKS[trade]&&STUDY_TASKS[trade][focus])||["Review key concepts","Work practice problems","Self-quiz"];
      lib.forEach(t=>tasks.push({label:t,block:focus,done:false}));
      // second block if hours allow
      if(hours>=8){const f2=ordered[(idx+Math.ceil(ordered.length/2))%ordered.length];if(f2!==focus){const l2=(STUDY_TASKS[trade]&&STUDY_TASKS[trade][f2])||[];if(l2[0])tasks.push({label:l2[0],block:f2,done:false});}}
      tasks.push({label:`Take a 10-question quick quiz on ${focus}`,block:focus,done:false});
    } else {
      const r=w-contentWeeks;
      tasks.push({label:`Full-length mock exam #${r+1} — timed`,block:"Mock exam",done:false});
      tasks.push({label:"Review every missed question + log weak blocks",block:"Review",done:false});
      tasks.push({label:`Re-drill the 2 lowest blocks from the mock`,block:"Review",done:false});
      if(r===reviewWeeks-1){tasks.push({label:"Final confidence pass + rest before exam day",block:"Exam prep",done:false});}
    }
    weeks.push({tasks});
  }
  return {trade,examDate,hoursPerWeek:hours,weak:weak.slice(),created:today(),weeks};
}

function renderWeeks(root,plan,onToggle){
  const blockColor=(b)=>{
    if(b==="Mock exam")return "rgba(200,16,46,.18);color:#ff5e78";
    if(b==="Review"||b==="Exam prep")return "rgba(74,163,255,.16);color:var(--blue)";
    return "rgba(255,176,0,.16);color:var(--amber)";
  };
  plan.weeks.forEach((wk,wi)=>{
    const dateStr=weekDateLabel(plan.examDate,plan.weeks.length,wi);
    const done=wk.tasks.filter(t=>t.done).length;
    const week=el(`<div class="week"><div class="wh"><div><b>Week ${wi+1}</b> <span class="dim" style="font-size:12.5px">· ${dateStr}</span></div><span class="tag">${done}/${wk.tasks.length} done</span></div></div>`);
    const body=el(`<div class="wb"></div>`);
    wk.tasks.forEach((t)=>{
      const task=el(`<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''}><div class="grow"><span class="lbl" style="font-size:13.5px">${esc(t.label)}</span></div><span class="chip" style="background:${blockColor(t.block)}">${esc(t.block)}</span></div>`);
      const cb=$("input",task);
      cb.onchange=()=>{t.done=cb.checked;if(onToggle)onToggle();else{task.classList.toggle("done",t.done);}};
      if(!onToggle)cb.disabled=true; // ad-hoc preview (not yet saved) — read-only
      body.append(task);
    });
    week.append(body);root.append(week);
  });
}
function weekDateLabel(examDate,totalWeeks,weekIndex){
  // week 0 starts (totalWeeks) weeks before exam
  const exam=new Date(examDate+"T00:00:00");
  const start=new Date(exam);start.setDate(start.getDate()-(totalWeeks-weekIndex)*7);
  return start.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

  const w=window.open("","_blank");
  if(!w){toast("Allow pop-ups to print the plan");return;}
  w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>{try{w.print();}catch(e){}},350);
}

VIEWS.bank=function(root,params){
  const st={trade: params.trade || DB._lastBankTrade || "electrician"};
  function paint(){
    root.innerHTML="";
    DB._lastBankTrade=st.trade;
    const custCount=(DB.customQuestions||[]).length;
    root.append(el(`<div class="page-head spread">
      <div><div class="kicker">Question Bank</div><h1>Manage exam questions</h1>
      <p class="muted">Add your own questions right here — no file editing. Custom questions are saved in this browser, used in every mock exam and intake, and included in your Export backup.${custCount?` <b>${custCount}</b> custom so far.`:""}</p></div>
      <button class="btn primary" id="add">＋ Add question</button>
    </div>`));
    const seg=el(`<div class="seg" style="flex-wrap:wrap;margin-bottom:18px"></div>`);
    trades().forEach(k=>{
      const n=questionsFor(k).length;
      const b=el(`<button class="${k===st.trade?'on':''}">${TRADES[k].emoji} ${TRADES[k].name.split(" ")[0]} <span class="dim" style="margin-left:3px">${n}</span></button>`);
      b.onclick=()=>{st.trade=k;paint();};
      seg.append(b);
    });
    root.append(seg);

    const blocks=TRADES[st.trade].blocks;
    const qs=questionsFor(st.trade);
    blocks.forEach(block=>{
      const list=qs.filter(q=>q.block===block);
      const card=el(`<div class="card" style="margin-bottom:14px"><div class="spread" style="margin-bottom:6px"><h3>${esc(block)}</h3><span class="dim">${list.length} question${list.length===1?"":"s"}</span></div></div>`);
      if(!list.length)card.append(el(`<div class="empty" style="padding:18px">Nothing here yet — add the first one.</div>`));
      list.forEach(q=>{
        const custom=!!q.id;
        const item=el(`<div style="padding:11px 0;border-bottom:1px solid var(--line)">
          <div class="spread" style="align-items:flex-start;gap:10px">
            <div class="grow"><div style="font-weight:600">${esc(q.q)}</div>
            <div class="muted" style="font-size:13px;margin-top:4px">Answer <b>${"ABCD"[q.answer]}</b> — ${esc(q.opts[q.answer])}</div></div>
            <span class="pill ${custom?"amber":""}" style="flex:0 0 auto">${custom?"custom":"built-in"}</span>
          </div></div>`);
        if(custom){
          const acts=el(`<div class="row" style="margin-top:9px"><button class="btn sm ghost" data-edit>Edit</button><button class="btn sm red ghost" data-del>Delete</button></div>`);
          acts.querySelector("[data-edit]").onclick=()=>questionModal(q,paint);
          acts.querySelector("[data-del]").onclick=()=>{if(confirm("Delete this custom question?")){DB.customQuestions=DB.customQuestions.filter(x=>x.id!==q.id);save();toast("Question deleted");paint();}};
          item.append(acts);
        }
        card.append(item);
      });
      root.append(card);
    });
    $("#add",root).onclick=()=>questionModal({trade:st.trade,block:blocks[0]},paint);
  }
  paint();
};

function modal(node){
  const bg=el(`<div class="modal-bg"></div>`);
  bg.append(node);
  bg.addEventListener("click",e=>{if(e.target===bg)bg.remove();});
  document.body.append(bg);
  return bg;
}
function addClientModal(existing){
  const m=el(`<div class="modal">
    <h2>${existing?"Edit client":"New client"}</h2>
    <p class="muted" style="margin:2px 0 18px;font-size:13px">${existing?"Update their details.":"Creates a fresh client file. You can run an intake or mock exam right after."}</p>
    <label class="fld" style="margin-bottom:12px">Name<input type="text" id="mName" value="${existing?esc(existing.name):""}" placeholder="Full name"></label>
    <label class="fld" style="margin-bottom:12px">Trade<select id="mTrade"></select></label>
    <label class="fld" style="margin-bottom:18px">Target exam date<input type="date" id="mDate" value="${existing?existing.examDate:""}"></label>
    <div id="dupWarn"></div>
    <div class="row"><button class="btn ghost grow" id="cancel">Cancel</button><button class="btn primary grow" id="ok">${existing?"Save":"Create"}</button></div>
  </div>`);
  const sel=$("#mTrade",m);
  trades().forEach(k=>{const o=el(`<option value="${k}">${TRADES[k].emoji} ${TRADES[k].name}</option>`);sel.append(o);});
  if(existing)sel.value=existing.trade;
  const bg=modal(m);
  const warn=$("#dupWarn",m);
  function clearWarn(){warn.innerHTML="";delete warn.dataset.ack;}
  // Clear any duplicate warning as soon as the coach edits the name or trade.
  $("#mName",m).addEventListener("input",clearWarn);
  sel.addEventListener("change",clearWarn);
  $("#cancel",m).onclick=()=>bg.remove();
  $("#ok",m).onclick=()=>{
    const name=$("#mName",m).value.trim();if(!name){toast("Name required");return;}
    const trade=sel.value;const date=$("#mDate",m).value;
    if(existing){existing.name=name;existing.trade=trade;existing.examDate=date;save();bg.remove();toast("Saved");render();return;}
    const create=()=>{const c=newClient(name,trade,date);bg.remove();toast("Client created");go("client",{id:c.id});};
    const match=findClientByNameTrade(name,trade);
    if(match&&!warn.dataset.ack){
      // Non-blocking warning — never prevents creation, just offers the choice.
      warn.dataset.ack="1";
      warn.innerHTML="";
      warn.append(el(`<div class="card tight" style="border-color:var(--warn);background:rgba(255,122,69,.08);margin-bottom:14px">
        <div style="font-size:13px;color:var(--warn);font-weight:700;margin-bottom:8px">A ${esc(TRADES[trade].name)} client named "${esc(match.name)}" already exists.</div>
        <div class="row"><button class="btn sm grow" data-open>Open existing file</button><button class="btn sm grow" data-anyway>Create anyway</button></div>
        <div class="dim" style="font-size:12px;margin-top:7px">Or edit the name/trade above and Create again.</div>
      </div>`));
      $("[data-open]",warn).onclick=()=>{bg.remove();go("client",{id:match.id});};
      $("[data-anyway]",warn).onclick=create;
      return;
    }
    create();
  };
  setTimeout(()=>$("#mName",m).focus(),30);
}
function questionModal(seed,onDone){
  const editing=!!seed.id;
  const m=el(`<div class="modal"><h2>${editing?"Edit":"Add"} question</h2>
    <p class="muted" style="margin:2px 0 16px;font-size:13px">Saved in this browser and used everywhere questions appear. Mark exactly one option correct.</p>
    <div class="grid g2" style="margin-bottom:12px">
      <label class="fld">Trade<select id="qTrade"></select></label>
      <label class="fld">Block<select id="qBlock"></select></label>
    </div>
    <label class="fld" style="margin-bottom:12px">Question<textarea id="qText" placeholder="Enter the question…">${editing?esc(seed.q):""}</textarea></label>
    <div id="optWrap"></div>
    <label class="fld" style="margin:6px 0 16px">Why (shown in the answer review)<textarea id="qWhy" placeholder="Explain the correct answer…">${editing?esc(seed.why):""}</textarea></label>
    <div class="row"><button class="btn ghost grow" id="cancel">Cancel</button><button class="btn primary grow" id="ok">${editing?"Save changes":"Add question"}</button></div>
  </div>`);
  const tSel=$("#qTrade",m), bSel=$("#qBlock",m);
  trades().forEach(k=>tSel.append(el(`<option value="${k}">${TRADES[k].name}</option>`)));
  tSel.value=seed.trade||"electrician";
  function fillBlocks(){bSel.innerHTML="";TRADES[tSel.value].blocks.forEach(b=>bSel.append(el(`<option>${esc(b)}</option>`)));if(seed.block&&TRADES[tSel.value].blocks.includes(seed.block))bSel.value=seed.block;}
  fillBlocks();tSel.onchange=fillBlocks;
  const optWrap=$("#optWrap",m);const correct={v:editing?seed.answer:0};
  for(let i=0;i<4;i++){
    const row=el(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <input type="radio" name="qcorrect" ${(editing?seed.answer:0)===i?"checked":""} title="Mark correct" style="width:18px;height:18px;accent-color:var(--green);flex:0 0 auto">
      <input type="text" data-opt="${i}" value="${editing?esc(seed.opts[i]):""}" placeholder="Option ${"ABCD"[i]}">
    </div>`);
    row.querySelector("input[type=radio]").onchange=()=>{correct.v=i;};
    optWrap.append(row);
  }
  optWrap.append(el(`<div class="dim" style="font-size:12px;margin:2px 0 6px">● Select the radio beside the correct option.</div>`));
  const bg=modal(m);
  $("#cancel",m).onclick=()=>bg.remove();
  $("#ok",m).onclick=()=>{
    const q=$("#qText",m).value.trim();
    const opts=[...optWrap.querySelectorAll("input[type=text]")].map(x=>x.value.trim());
    const why=$("#qWhy",m).value.trim();
    if(!q){toast("Enter the question");return;}
    if(opts.some(o=>!o)){toast("Fill in all four options");return;}
    const rec={trade:tSel.value,block:bSel.value,q,opts,answer:correct.v,why:why||"(no explanation provided)"};
    if(editing){Object.assign(seed,rec);save();toast("Question updated");}
    else{rec.id=uid();DB.customQuestions.push(rec);save();toast("Question added");}
    bg.remove();if(onDone)onDone();
  };
  setTimeout(()=>$("#qText",m).focus(),30);
}
function mergeModal(){
  const groups=duplicateGroups();
  const m=el(`<div class="modal"><h2>Merge duplicate clients</h2>
    <p class="muted" style="margin:2px 0 16px;font-size:13px">${groups.length?"Each group below is the same person across multiple files. Merging keeps the oldest record and folds in every exam, session, intake, and the most recent plan — nothing is lost.":"No duplicates left — you're all clear."}</p></div>`);
  const bg=modal(m);
  groups.forEach(g=>{
    g.sort((a,b)=>(a.created||"").localeCompare(b.created||""));
    const wrap=el(`<div class="card tight" style="margin-bottom:12px"><div class="spread" style="margin-bottom:8px"><b>${esc(g[0].name)} · ${TRADES[g[0].trade].name}</b><button class="btn sm primary" data-merge>Merge ${g.length} →</button></div></div>`);
    g.forEach((c,i)=>{
      wrap.append(el(`<div class="task"><div class="grow"><div style="font-weight:600;font-size:13px">${i===0?'<span class="pill green" style="margin-right:6px">keep</span>':""}Created ${fmtDate(c.created)}</div><div class="muted" style="font-size:12.5px">${(c.exams||[]).length} exam${(c.exams||[]).length===1?"":"s"} · ${(c.sessions||[]).length} session${(c.sessions||[]).length===1?"":"s"} · ${c.plan?"has plan":"no plan"} · exam ${fmtDate(c.examDate)}</div></div></div>`));
    });
    wrap.querySelector("[data-merge]").onclick=()=>{mergeClients(g.map(c=>c.id));toast("Merged into one file");bg.remove();mergeModal();};
    m.append(wrap);
  });
  const foot=el(`<div class="row" style="margin-top:6px">${groups.length>1?'<button class="btn ghost grow" id="mergeAll">Merge all groups</button>':""}<button class="btn ${groups.length?"":"primary"} grow" id="done">Done</button></div>`);
  m.append(foot);
  $("#done",m).onclick=()=>{bg.remove();go("dashboard");};
  if($("#mergeAll",m))$("#mergeAll",m).onclick=()=>{duplicateGroups().forEach(g=>mergeClients(g.map(c=>c.id)));toast("All duplicates merged");bg.remove();go("dashboard");};
}
// Charge a client for a coaching package via the Stripe Connect sample server.
function collectPaymentModal(client){
  const m=el(`<div class="modal"><h2>Collect payment</h2>
    <p class="muted" style="margin:2px 0 14px;font-size:13px">Charge ${esc(client.name)} for one of your coaching packages via Stripe. Funds go to your connected account, minus the platform fee.</p>
    <label class="fld" style="margin-bottom:10px">Payments server URL
      <input type="text" id="payUrl" value="${esc(paymentsApi())}" placeholder="https://your-stripe-server">
    </label>
    <div class="row" style="margin-bottom:12px"><button class="btn sm" id="loadBtn">Load packages</button></div>
    <div id="payList"></div>
    <div class="divider"></div>
    <div class="row"><button class="btn ghost grow" id="cancel">Close</button></div>
  </div>`);
  const bg=modal(m);
  $("#cancel",m).onclick=()=>bg.remove();
  const listEl=$("#payList",m);
  async function load(){
    const base=$("#payUrl",m).value.trim().replace(/\/+$/,"");
    if(!base){toast("Enter the payments server URL");return;}
    setPaymentsApi(base); // remember it for next time (this browser)
    listEl.innerHTML='<div class="empty" style="padding:20px">Loading packages…</div>';
    try{
      const r=await fetch(base+"/api/products");
      const data=await r.json();
      if(!r.ok) throw new Error(data.error||("HTTP "+r.status));
      if(!Array.isArray(data)) throw new Error(data.error||"Unexpected response");
      if(!data.length){listEl.innerHTML='<div class="empty" style="padding:20px">No packages found yet — create some in your Stripe storefront first.</div>';return;}
      listEl.innerHTML="";
      data.forEach(p=>{
        const amount=new Intl.NumberFormat(undefined,{style:"currency",currency:(p.currency||"usd").toUpperCase()}).format((p.amount||0)/100);
        const row=el(`<div class="task"><div class="grow"><div style="font-weight:600;font-size:13.5px">${esc(p.name)}</div><div class="muted" style="font-size:12.5px">${p.description?esc(p.description)+" · ":""}${amount}</div></div><button class="btn sm primary" data-buy>Charge</button></div>`);
        row.querySelector("[data-buy]").onclick=async(e)=>{
          e.target.disabled=true;e.target.textContent="…";
          try{
            const ret=location.href.split("?")[0]+"?payment=success";
            const cr=await fetch(base+"/api/checkout",{method:"POST",headers:{"Content-Type":"application/json"},
              body:JSON.stringify({productId:p.id,successUrl:ret,cancelUrl:location.href.split("?")[0]})});
            const cd=await cr.json();
            if(!cr.ok) throw new Error(cd.error||"Checkout failed");
            window.location.href=cd.url; // off to Stripe-hosted Checkout
          }catch(err){toast(err.message);e.target.disabled=false;e.target.textContent="Charge";}
        };
        listEl.append(row);
      });
    }catch(err){
      listEl.innerHTML='<div class="empty" style="padding:20px;border-color:var(--warn);color:var(--warn)">Couldn\'t load packages from <b>'+esc(base)+'</b>.<br><span style="color:#ff5e78;font-size:12.5px">'+esc(err.message)+'</span><br><span style="color:var(--ink3);font-size:12.5px;margin-top:6px;display:inline-block">Make sure the Stripe sample server is running (<span class="mono">npm run dev</span>) and the URL above is correct.</span></div>';
    }
  }
  $("#loadBtn",m).onclick=load;
  load(); // attempt on open
}

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="red-seal-rescue-backup-"+today()+".json";a.click();URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function importData(){
  const inp=el(`<input type="file" accept="application/json" class="hidden">`);
  document.body.append(inp);
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);if(!d.clients)throw 0;
      if(confirm("Replace all current data with this backup?")){DB=d;save();toast("Data imported");go("dashboard");}
    }catch(e){toast("Invalid backup file");}inp.remove();};
    rd.readAsText(f);};
  inp.click();
}
